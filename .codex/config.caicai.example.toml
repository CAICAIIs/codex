# Personal example config for CAICAIIs/codex.
# Copy selected settings into ~/.codex/config.toml or a trusted project config.
# Do not put API keys here.

model = "gpt-5.5"
model_reasoning_effort = "high"
review_model = "gpt-5.4"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 3600

[profiles.caicai-safe]
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[profiles.caicai-autonomous]
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "danger-full-access"
approval_policy = "never"
